<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todos os Itens</title>
    <script src="script.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container my-4">
        <div class="row g-2 align-items-center">
            <div class="col-md-5">
                <input id="search" class="form-control" placeholder="Buscar filme...">
            </div>
            <div class="col-md-3">
                <select id="filter" class="form-select">
                    <option value="popularidade" selected>Popularidade</option>
                    <option value="ano">Ano</option>
                    <option value="titulo">Título</option>
                </select>
            </div>
            <div class="col-md-2">
                <button id="btnSearch" class="btn btn-primary">Buscar</button>
            </div>
            <div class="col-12 mt-2">
                <p id="message" class="text-muted"></p>
            </div>
        </div>
    </div>

    <div id="movie-list" class="row"></div>
    <script src="script.js"></script>



</body>
</html>
